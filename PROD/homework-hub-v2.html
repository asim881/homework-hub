<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homework Hub</title>
<style>
  :root {
    --bg: #f7f3ee;
    --fatima: #ff6b9d; --fatima-light: #ffe0ed;
    --rayyan: #4e9af1; --rayyan-light: #daeeff;
    --haniya: #7bc67e; --haniya-light: #dff2e0;
    --text: #2d2d2d; --muted: #888;
    --border: #e8e0d8;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

  .screen { display: none; flex-direction: column; width: 100%; }
  .screen.active { display: flex; }

  /* ── LOGIN ── */
  #login-screen {
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 40px 16px; min-height: 600px;
  }
  .login-card {
    background: white; border-radius: 32px; padding: 40px 32px;
    width: 100%; max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4); text-align: center;
    margin: 0 auto;
  }
  .login-logo {
    font-family: cursive; font-size: 2.2rem; margin-bottom: 6px;
    background: linear-gradient(135deg, #4e9af1, #ff6b9d);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .login-subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

  .kid-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .kid-btn {
    border: 3px solid var(--border); border-radius: 20px; padding: 20px 8px;
    cursor: pointer; background: white;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-family: inherit;
  }
  .kid-btn:hover { transform: translateY(-6px); box-shadow: var(--shadow); }
  .kid-btn.selected { transform: translateY(-6px); box-shadow: var(--shadow); }
  .kid-btn[data-kid="Fatima"] { border-color: var(--fatima); }
  .kid-btn[data-kid="Fatima"].selected { background: var(--fatima-light); border-width: 3px; }
  .kid-btn[data-kid="Rayyan"] { border-color: var(--rayyan); }
  .kid-btn[data-kid="Rayyan"].selected { background: var(--rayyan-light); border-width: 3px; }
  .kid-btn[data-kid="Haniya"] { border-color: var(--haniya); }
  .kid-btn[data-kid="Haniya"].selected { background: var(--haniya-light); border-width: 3px; }
  .kid-avatar { font-size: 2.4rem; margin-bottom: 6px; }
  .kid-name { font-weight: 800; font-size: 0.95rem; }
  .kid-grade { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  .start-btn {
    width: 100%; padding: 16px; border: none; border-radius: 16px;
    font-family: inherit; font-size: 1.05rem; font-weight: 800;
    color: white; cursor: pointer;
    background: linear-gradient(135deg, #4e9af1, #ff6b9d);
    transition: all 0.2s; letter-spacing: 0.02em;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(78,154,241,0.4); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .dash-link {
    margin-top: 16px; background: none; border: none;
    color: #4e9af1; font-family: inherit; font-weight: 700;
    font-size: 0.9rem; cursor: pointer; text-decoration: underline;
  }

  /* ── APP HEADER ── */
  .app-header {
    padding: 18px 24px; display: flex; align-items: center;
    justify-content: space-between; background: white;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
  }
  .header-name { font-weight: 900; font-size: 1.1rem; }
  .header-sub { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
  .header-streak {
    display: flex; align-items: center; gap: 5px;
    background: #fff8e6; border: 2px solid #ffd44d;
    border-radius: 20px; padding: 5px 12px;
    font-weight: 800; font-size: 0.85rem; color: #b8860b;
  }
  .back-btn {
    background: none; border: 2px solid var(--border); border-radius: 10px;
    padding: 6px 14px; font-family: inherit;
    font-size: 0.8rem; font-weight: 700; color: var(--muted); cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: #ccc; color: var(--text); }

  /* ── DAY TABS ── */
  .day-selector { padding: 18px 24px 8px; overflow-x: auto; }
  .day-tabs { display: flex; gap: 10px; min-width: max-content; }
  .day-tab {
    padding: 8px 16px; border-radius: 16px; border: 2px solid var(--border);
    background: white; font-family: inherit;
    font-weight: 700; font-size: 0.82rem; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .day-tab:hover { border-color: #bbb; }
  .day-tab.active { color: white; border-color: transparent; }
  .day-tab.completed .day-tab-label::after { content: ' ✓'; }
  .day-tab-label { font-size: 0.82rem; font-weight: 700; }
  .day-tab-date { font-size: 0.68rem; font-weight: 600; opacity: 0.7; }

  /* ── CONTENT ── */
  .main-content { padding: 16px 20px; max-width: 100%; margin: 0 auto; width: 100%; overflow-x: hidden; }

  .subject-card {
    background: white; border-radius: var(--radius); padding: 24px;
    margin-bottom: 20px; box-shadow: var(--shadow); border: 2px solid var(--border);
    width: 100%; overflow-x: hidden;
  }
  .subject-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .subject-icon {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
  }
  .subject-title { font-weight: 900; font-size: 1.2rem; }
  .subject-topic { font-size: 0.84rem; color: var(--muted); margin-top: 2px; }
  .subject-timer {
    margin-left: auto; font-size: 0.78rem; color: var(--muted);
    background: var(--bg); padding: 5px 12px; border-radius: 10px; font-weight: 700;
  }

  /* ── QUESTIONS ── */
  .question-block {
    margin-bottom: 22px; padding-bottom: 22px;
    border-bottom: 1px dashed var(--border);
  }
  .question-block:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .question-num { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; color: var(--muted); }
  .question-text { font-size: 1rem; font-weight: 700; line-height: 1.55; margin-bottom: 10px; }
  .tag { display: inline-block; border-radius: 6px; padding: 1px 8px; font-size: 0.72rem; font-weight: 800; margin-right: 6px; vertical-align: middle; }
  .tag-challenge { background: #fff3cd; color: #856404; }
  .tag-wonder { background: #e8f4fd; color: #1a6fa0; }
  .tag-stretch { background: #f3e8ff; color: #6b21a8; }

  .passage-box {
    background: #f8f4ef; border-radius: 12px; padding: 16px; margin-bottom: 20px;
    border-left: 4px solid #ccc; font-size: 0.95rem; line-height: 1.65;
    font-style: italic; color: #555;
  }
  .passage-box strong { font-style: normal; color: var(--text); }

  .intro-box {
    background: #f0f7ff; border-radius: 12px; padding: 14px; margin-bottom: 20px;
    font-size: 0.9rem; line-height: 1.6; color: #3d6b99;
  }

  .code-box {
    background: #1e1e2e; border-radius: 12px; padding: 16px; margin-bottom: 20px;
    font-family: 'Courier New', monospace; font-size: 0.88rem;
    color: #cdd6f4; line-height: 1.7; white-space: pre-wrap; overflow-x: auto;
  }

  .answer-box {
    display: block; width: 100%; max-width: 100%; border: 2px solid var(--border); border-radius: 12px;
    padding: 12px 16px; font-family: inherit; font-size: 0.95rem;
    resize: vertical; min-height: 90px; outline: none;
    transition: border-color 0.2s; line-height: 1.5; color: var(--text); background: white;
    box-sizing: border-box;
  }
  .answer-box:focus { border-color: #4e9af1; }

  /* ── FEEDBACK ── */
  .feedback-block {
    margin-top: 10px; padding: 12px 16px; border-radius: 12px;
    font-size: 0.88rem; line-height: 1.5; display: none;
  }
  .feedback-block.correct { background: #e8f8e8; border: 2px solid #7bc67e; color: #2d6a30; display: block; }
  .feedback-block.partial { background: #fff8e6; border: 2px solid #ffd44d; color: #856404; display: block; }
  .feedback-block.incorrect { background: #ffeaea; border: 2px solid #ff6b6b; color: #922b2b; display: block; }
  .feedback-score { font-weight: 900; margin-bottom: 3px; }

  /* ── SUBMIT ── */
  .submit-section { text-align: center; padding: 8px 0 20px; }
  .submit-btn {
    padding: 15px 44px; border: none; border-radius: 50px;
    font-family: inherit; font-size: 1rem; font-weight: 800;
    color: white; cursor: pointer; transition: all 0.2s;
  }
  .submit-btn:hover { transform: translateY(-2px); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── RESULTS ── */
  .results-card {
    background: white; border-radius: var(--radius); padding: 32px;
    text-align: center; box-shadow: var(--shadow); border: 2px solid var(--border); display: none;
  }
  .results-card.visible { display: block; }
  .score-ring {
    width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 18px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; border: 6px solid;
  }
  .score-ring .num { font-size: 2rem; font-weight: 900; line-height: 1; }
  .score-ring .denom { font-size: 0.82rem; color: var(--muted); }
  .results-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 8px; }
  .results-msg { color: var(--muted); font-size: 0.92rem; margin-bottom: 22px; line-height: 1.55; }
  .next-btn {
    padding: 13px 32px; border: none; border-radius: 50px;
    font-family: inherit; font-size: 0.95rem; font-weight: 800;
    color: white; cursor: pointer; transition: all 0.2s;
  }
  .next-btn:hover { transform: translateY(-2px); }

  /* ── LOADING STATES ── */
  .grading-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  .grading-overlay.visible { display: flex; }
  .grading-box {
    background: white; border-radius: 24px; padding: 40px;
    text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.3); min-width: 240px;
  }
  .grading-emoji { font-size: 3rem; margin-bottom: 14px; animation: bounce 0.8s ease infinite alternate; }
  @keyframes bounce { to { transform: translateY(-10px); } }
  .grading-text { font-size: 1.15rem; font-weight: 800; margin-bottom: 6px; }
  .grading-sub { font-size: 0.88rem; color: var(--muted); }

  .generating-card {
    background: white; border-radius: var(--radius); padding: 48px 28px;
    text-align: center; box-shadow: var(--shadow); border: 2px solid var(--border);
  }
  .gen-spinner {
    width: 48px; height: 48px; border: 4px solid var(--border);
    border-top-color: #4e9af1; border-radius: 50%;
    animation: spin 0.9s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .gen-text { font-weight: 800; font-size: 1.1rem; margin-bottom: 8px; }
  .gen-sub { font-size: 0.88rem; color: var(--muted); }

  /* ── DASHBOARD ── */
  #dashboard-screen { background: var(--bg); }
  .dash-header {
    padding: 22px 24px; background: white;
    border-bottom: 2px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .dash-title { font-size: 1.25rem; font-weight: 900; }
  .dash-subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
  .dash-content { padding: 16px 20px; max-width: 100%; margin: 0 auto; overflow-x: hidden; }

  .kid-progress-card {
    background: white; border-radius: var(--radius); padding: 24px;
    margin-bottom: 16px; border: 2px solid var(--border); box-shadow: var(--shadow);
  }
  .kid-progress-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .prog-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
  .prog-name { font-weight: 900; font-size: 1rem; }
  .prog-summary { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .prog-pct { margin-left: auto; font-size: 1.7rem; font-weight: 900; }

  .subject-bars { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 12px; }
  .bar-label { width: 100px; min-width: 100px; font-size: 0.72rem; font-weight: 700; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 10px; background: var(--border); border-radius: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 10px; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
  .bar-pct { width: 38px; font-size: 0.78rem; font-weight: 800; text-align: right; }

  /* ── WEEK BANNER ── */
  .week-banner {
    background: linear-gradient(135deg, #0f3460, #4e9af1);
    border-radius: var(--radius); padding: 28px; text-align: center;
    color: white; margin-bottom: 20px;
  }
  .week-banner h2 { font-size: 1.6rem; font-weight: 900; margin-bottom: 6px; }
  .week-banner p { opacity: 0.88; font-size: 0.92rem; }

  /* ── ERROR ── */
  .error-banner {
    background: #ffeaea; border: 2px solid #ff6b6b; border-radius: 12px;
    padding: 12px 16px; color: #922b2b; font-size: 0.88rem; font-weight: 700;
    margin-bottom: 16px;
  }

  /* ── SETUP NOTICE ── */
  .setup-notice {
    background: #fff8e6; border: 2px solid #ffd44d; border-radius: 16px;
    padding: 20px 24px; margin-bottom: 20px; font-size: 0.88rem; line-height: 1.6;
  }
  .setup-notice strong { display: block; font-size: 0.95rem; margin-bottom: 6px; }
  .setup-notice code {
    background: #fff3cd; border-radius: 6px; padding: 2px 8px;
    font-family: monospace; font-size: 0.85rem; word-break: break-all;
  }

  /* ── SYNC INDICATOR ── */
  .sync-indicator {
    font-size: 0.7rem; font-weight: 700; padding: 4px 10px;
    border-radius: 10px; border: 1.5px solid var(--border);
    color: var(--muted); background: var(--bg); display: none;
  }
  .sync-indicator.pending { color: #b8860b; background: #fff8e6; border-color: #ffd44d; }

  @media (max-width: 480px) {
    .login-card { padding: 32px 20px; }
    .kid-grid { gap: 8px; }
    .kid-btn { padding: 14px 4px; }
    .kid-avatar { font-size: 2rem; }
    .kid-name { font-size: 0.82rem; }
    .main-content { padding: 16px; }
    .subject-card { padding: 20px; }
  }
</style>
</head>
<body>

<!-- ═══════ LOGIN ═══════ -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="login-logo">📚 Homework Hub</div>
    <div class="login-subtitle">Who's doing homework today?</div>

    <div class="kid-grid">
      <button class="kid-btn" data-kid="Fatima" onclick="selectKid('Fatima')">
        <div class="kid-avatar">⚽</div>
        <div class="kid-name">Fatima</div>
        <div class="kid-grade">Grade 5</div>
      </button>
      <button class="kid-btn" data-kid="Rayyan" onclick="selectKid('Rayyan')">
        <div class="kid-avatar">🚀</div>
        <div class="kid-name">Rayyan</div>
        <div class="kid-grade">Grade 5</div>
      </button>
      <button class="kid-btn" data-kid="Haniya" onclick="selectKid('Haniya')">
        <div class="kid-avatar">🌻</div>
        <div class="kid-name">Haniya</div>
        <div class="kid-grade">Grade 4</div>
      </button>
    </div>

    <div id="login-error"></div>

    <button class="start-btn" id="start-btn" onclick="startHomework()" disabled>
      Start Today's Homework ✏️
    </button>
    <button class="dash-link" onclick="showDashboard()">📊 View Progress Dashboard</button>
  </div>
</div>

<!-- ═══════ APP ═══════ -->
<div id="app-screen" class="screen" style="display:none">
  <div class="app-header">
    <div class="header-left">
      <div class="header-avatar" id="header-avatar"></div>
      <div>
        <div class="header-name" id="header-name"></div>
        <div class="header-sub" id="header-sub"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="sync-indicator" id="sync-indicator"></div>
      <div class="header-streak" id="header-streak">🔥 0</div>
      <button class="back-btn" onclick="logout()">← Back</button>
    </div>
  </div>

  <div class="day-selector">
    <div class="day-tabs" id="day-tabs"></div>
  </div>

  <div class="main-content" id="main-content"></div>
</div>

<!-- ═══════ DASHBOARD ═══════ -->
<div id="dashboard-screen" class="screen" style="display:none">
  <div class="dash-header">
    <div>
      <div class="dash-title">📊 Progress Dashboard</div>
      <div class="dash-subtitle" id="dash-week-label">This week's overview</div>
    </div>
    <button class="back-btn" onclick="showLogin()">← Back</button>
  </div>
  <div class="dash-content" id="dash-content"></div>
</div>

<!-- ═══════ DEV RESET (hidden) ═══════ -->
<div id="dev-reset" style="text-align:center;padding:10px;font-size:0.72rem;color:#bbb;cursor:default;user-select:none" ondblclick="devReset()">Homework Hub v2</div>

<!-- ═══════ GRADING OVERLAY ═══════ -->
<div class="grading-overlay" id="grading-overlay">
  <div class="grading-box">
    <div class="grading-emoji">🤔</div>
    <div class="grading-text">Grading your answers…</div>
    <div class="grading-sub">Claude is reading your work!</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIGURATION — UPDATE THESE TWO VALUES
// ═══════════════════════════════════════════════════════

// Replace with your Google Apps Script Web App URL after deployment
// Leave as empty string '' to use direct API (requires key entry)
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbxB-SklnHp7Q5XwnOSD_mbGSYDAY9s9ccFlQdPIpSZ6qhrWYpP6z-Thd5GEPTjI8JHyRg/exec';

// Only used if PROXY_URL is empty (fallback direct mode)
// In production leave this empty and use the proxy
const FALLBACK_API_KEY = '';

// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const KIDS = {
  Fatima: { grade: 5, year: 'Grade 5', emoji: '⚽', color: '#ff6b9d', light: '#ffe0ed',
    profile: 'Fatima is in Grade 5. She loves soccer and building games in Scratch. She is at grade level in Math and English. She is interested in game design and JavaScript. She has prior Scratch experience.' },
  Rayyan: { grade: 5, year: 'Grade 5', emoji: '🚀', color: '#4e9af1', light: '#daeeff',
    profile: 'Rayyan is in Grade 5. He is strong in Math and wants to learn Python. He has prior Scratch experience. He is at grade level in English.' },
  Haniya: { grade: 4, year: 'Grade 4', emoji: '🌻', color: '#7bc67e', light: '#dff2e0',
    profile: 'Haniya is in Grade 4. She loves building games in Scratch. She struggles with English comprehension and benefits from scaffolding (sentence starters, shorter passages, direct retrieval questions before inference). She is at grade level in Math.' }
};

const DAYS = [
  { day: 1, label: 'Mon', subject: 'Math',            icon: '🔢', color: '#ff9f43' },
  { day: 2, label: 'Tue', subject: 'English',         icon: '📖', color: '#54a0ff' },
  { day: 3, label: 'Wed', subject: 'Computer',        icon: '💻', color: '#5f27cd' },
  { day: 4, label: 'Thu', subject: 'Science',         icon: '🔬', color: '#00b894' },
  { day: 5, label: 'Fri', subject: 'Social Studies',  icon: '🌍', color: '#e9a800' },
  { day: 6, label: 'Sat', subject: 'Math+Finance',    icon: '💰', color: '#e17055', duration: 60 },
  { day: 7, label: 'Sun', subject: 'French+Creative', icon: '🎨', color: '#a29bfe', duration: 60 }
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let currentKid = null;
let currentDay = 1;
let progress = {};
let assignmentCache = {}; // { "Fatima-week2-day1": { topic, questions... } }
const _hintCache = {}; // { kid: "hint string" } — fetched once per session

// ═══════════════════════════════════════════════════════
// WEEK CALCULATION
// ═══════════════════════════════════════════════════════
const PROGRAM_START_DATE = '2026-05-04'; // Week 1 = Mon May 4 2026

function getWeekNumber() {
  const start = new Date(PROGRAM_START_DATE);
  const now = new Date();
  const diffDays = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return Math.floor(diffDays / 7) + 1;
}

function getCurrentDayOfWeek() {
  const d = new Date().getDay(); // 0=Sun,1=Mon...6=Sat
  if (d === 0) return 7; // Sunday = day 7
  return d; // Mon=1...Fri=5, Sat=6
}

function getWeekDates() {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
  });
}

async function getAssignment(kid, day) {
  const week = getWeekNumber();
  const cacheKey = `${kid}-w${week}-d${day}`;

  // Check memory cache first
  if (assignmentCache[cacheKey]) return assignmentCache[cacheKey];

  // Check localStorage cache
  try {
    const stored = localStorage.getItem(`assign-${cacheKey}`);
    if (stored) {
      assignmentCache[cacheKey] = JSON.parse(stored);
      return assignmentCache[cacheKey];
    }
  } catch(e) {}

  // Generate fresh via Claude
  const kidInfo = KIDS[kid];
  const dayInfo = DAYS[day - 1];
  const kidProgress = progress[kid] || {};

  // Build weakness context from prior scores
  let weaknesses = '';
  Object.entries(kidProgress).forEach(([dk, dp]) => {
    if (dp.score / dp.total < 0.7) {
      weaknesses += `${dp.subject} (Week ${dp.week || 1}, score ${dp.score}/${dp.total}); `;
    }
  });

  const topicHint = await fetchTopicHint(kid);
  const prompt = buildGenerationPrompt(kid, kidInfo, dayInfo, week, weaknesses, topicHint);

  const raw = await callClaude(prompt, 1200);
  let parsed;
  try {
    const cleaned = raw.replace(/```json|```/g, '').trim();
    parsed = JSON.parse(cleaned);
  } catch(e) {
    const m = raw.match(/\{[\s\S]*\}/);
    if (m) parsed = JSON.parse(m[0]);
    else throw new Error('Could not parse generated assignment');
  }

  // Cache it
  assignmentCache[cacheKey] = parsed;
  try { localStorage.setItem(`assign-${cacheKey}`, JSON.stringify(parsed)); } catch(e) {}

  return parsed;
}

// ═══════════════════════════════════════════════════════
// CLAUDE API CALL (via proxy or direct)
// ═══════════════════════════════════════════════════════
async function fetchTopicHint(kid) {
  if (_hintCache[kid] !== undefined) return _hintCache[kid];
  if (!PROXY_URL) return (_hintCache[kid] = '');
  try {
    const res  = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getSettings', kid })
    });
    const data = await res.json();
    _hintCache[kid] = data.hint || '';
  } catch(e) {
    _hintCache[kid] = '';
  }
  return _hintCache[kid];
}

async function callClaude(prompt, maxTokens = 1000) {
  if (PROXY_URL) {
    // Route through Google Apps Script proxy (API key stays server-side)
    const response = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ prompt, max_tokens: maxTokens })
    });
    if (!response.ok) {
      const err = await response.text();
      throw new Error(`Proxy error: ${err}`);
    }
    const data = await response.json();
    return data.text;
  } else {
    // Direct API call (fallback / setup mode)
    const key = FALLBACK_API_KEY || prompt_for_key();
    if (!key) throw new Error('No API key available');

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }
    const data = await response.json();
    return data.content[0].text;
  }
}

let _cachedKey = '';
function prompt_for_key() {
  if (_cachedKey) return _cachedKey;
  _cachedKey = window.prompt('Enter Anthropic API key to continue:') || '';
  return _cachedKey;
}

// ═══════════════════════════════════════════════════════
// GRADING
// ═══════════════════════════════════════════════════════
async function gradeAnswers(kid, assignment, answers) {
  const kidInfo = KIDS[kid];
  const prompt = `You are a warm, encouraging teacher grading homework for ${kid}, a ${kidInfo.year} student in Ontario, Canada.

Subject: ${assignment.topic}
${assignment.passage ? `Reading Passage: "${assignment.passage}"` : ''}
${assignment.intro ? `Context: ${assignment.intro}` : ''}

Questions and student answers:
${assignment.questions.map((q, i) => `Q${i+1}: ${q.q}\nAnswer: ${answers[i] || '(no answer)'}`).join('\n\n')}

Return ONLY valid JSON:
{
  "feedback": [
    { "score": 1, "text": "feedback" }
  ],
  "message": "One warm overall message, 2 sentences max, mention something specific."
}

Scoring: 1=fully correct, 0.5=partially correct/right track, 0=incorrect/blank
- Math: exact. 0.5 if method right but arithmetic error.
- Writing/English/Social Studies: 1 if thoughtful and addresses question, 0.5 if partial
- CS/coding: 1 if concept correct, 0.5 if partially understood
- Financial Literacy: 1 if reasoning is sound, 0.5 if partially right
- French: 1 if correct vocabulary/grammar, 0.5 if meaning is clear but has errors, 0 if wrong
- Creative: always 1 if a genuine thoughtful response is written
- Wonder/reflection questions: always 1 if a genuine response is written
- Haniya's sentence-starter questions: 1 if she completed the sentence with any reasonable answer
- Feedback: warm, specific, ${kidInfo.year}-appropriate, max 2 sentences per question`;

  const raw = await callClaude(prompt, 1000);
  let parsed;
  try {
    parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch(e) {
    const m = raw.match(/\{[\s\S]*\}/);
    if (m) parsed = JSON.parse(m[0]);
    else throw new Error('Could not parse grading response');
  }

  const score = parsed.feedback.reduce((s, f) => s + (f.score || 0), 0);
  return {
    score: Math.round(score * 10) / 10,
    total: assignment.questions.length,
    feedback: parsed.feedback,
    message: parsed.message
  };
}

// ═══════════════════════════════════════════════════════
// RENDER DAY
// ═══════════════════════════════════════════════════════
async function renderDay(day) {
  const kid = KIDS[currentKid];
  const dayInfo = DAYS[day - 1];
  const done = getKidDayProgress(currentKid, day);
  const content = document.getElementById('main-content');

  // Show proxy setup notice if neither proxy nor fallback key is configured
  let setupNotice = '';
  if (!PROXY_URL && !FALLBACK_API_KEY && !_cachedKey) {
    setupNotice = `<div class="setup-notice">
      <strong>⚙️ Setup needed</strong>
      To enable AI grading, set your <code>PROXY_URL</code> or <code>FALLBACK_API_KEY</code> in the app file.
      See the setup guide for instructions.
    </div>`;
  }

  // If already completed, load from cache and render
  if (done) {
    const cacheKey = `${currentKid}-w${done.week || 1}-d${day}`;
    let assignment = assignmentCache[cacheKey];
    if (!assignment) {
      try {
        const stored = localStorage.getItem(`assign-${cacheKey}`);
        if (stored) assignment = JSON.parse(stored);
      } catch(e) {}
    }
    if (assignment) {
      content.innerHTML = setupNotice + buildAssignmentHTML(assignment, dayInfo, kid, done);
      return;
    }
  }

  // Show loading state while generating
  content.innerHTML = `${setupNotice}<div class="generating-card">
    <div class="gen-spinner"></div>
    <div class="gen-text">Preparing ${dayInfo.subject} assignment…</div>
    <div class="gen-sub">Claude is building Week ${getWeekNumber()} questions for ${currentKid}</div>
  </div>`;

  try {
    const assignment = await getAssignment(currentKid, day);
    content.innerHTML = setupNotice + buildAssignmentHTML(assignment, dayInfo, kid, done);
  } catch(err) {
    content.innerHTML = `${setupNotice}<div class="error-banner">⚠️ Could not load assignment: ${err.message}</div>
    <div style="text-align:center;padding:20px;color:var(--muted)">Please check your API configuration and try again.</div>`;
  }
}

function buildAssignmentHTML(assignment, dayInfo, kid, done) {
  let html = `<div class="subject-card">
    <div class="subject-header">
      <div class="subject-icon" style="background:${kid.light}">${dayInfo.icon}</div>
      <div>
        <div class="subject-title">${dayInfo.subject}</div>
        <div class="subject-topic">${assignment.topic}</div>
      </div>
      <div class="subject-timer">⏱ ~${dayInfo.duration || 30} min</div>
    </div>`;

  if (assignment.passage) {
    html += `<div class="passage-box" style="border-left-color:${kid.color}">
      📄 <strong>Read this passage:</strong><br><br>${assignment.passage}
    </div>`;
  }
  if (assignment.intro) {
    html += `<div class="intro-box">💡 ${assignment.intro}</div>`;
  }
  if (assignment.code_sample) {
    html += `<div class="code-box">${assignment.code_sample}</div>`;
  }

  assignment.questions.forEach((q, i) => {
    const savedFeedback = done?.feedback?.[i];
    let qText = q.q
      .replace('⭐ CHALLENGE:', '<span class="tag tag-challenge">⭐ Challenge</span>')
      .replace('⭐', '<span class="tag tag-challenge">⭐ Challenge</span>')
      .replace('🌟', '<span class="tag tag-wonder">🌟 Wonder</span>');

    html += `<div class="question-block">
      <div class="question-num">Question ${i + 1}</div>
      <div class="question-text">${qText.replace(/\n/g, '<br>')}</div>
      <textarea class="answer-box" id="answer-${i}" placeholder="Write your answer here…"
        ${done ? 'disabled' : ''}>${done?.answers?.[i] || ''}</textarea>`;

    if (savedFeedback) {
      const cls = savedFeedback.score >= 1 ? 'correct' : savedFeedback.score >= 0.5 ? 'partial' : 'incorrect';
      const emoji = savedFeedback.score >= 1 ? '✅' : savedFeedback.score >= 0.5 ? '⚡' : '💡';
      const label = savedFeedback.score >= 1 ? 'Great work!' : savedFeedback.score >= 0.5 ? 'Partial credit' : 'Keep trying!';
      html += `<div class="feedback-block ${cls}">
        <div class="feedback-score">${emoji} ${label}</div>${savedFeedback.text}
      </div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;

  if (done) {
    const ratio = done.score / done.total;
    html += `<div class="results-card visible">
      <div class="score-ring" style="border-color:${kid.color};color:${kid.color}">
        <div class="num">${done.score}</div>
        <div class="denom">out of ${done.total}</div>
      </div>
      <div class="results-title">${getResultTitle(ratio)}</div>
      <div class="results-msg">${done.message || 'Great effort today!'}</div>
      ${currentDay < 7 ? `<button class="next-btn" style="background:${kid.color}" onclick="switchDay(${currentDay + 1})">Next Day →</button>` : '<div style="font-size:1.2rem;margin-top:8px">🎉 Week complete!</div>'}
    </div>`;
  } else {
    html += `<div class="submit-section">
      <button class="submit-btn" id="submit-btn" style="background:${kid.color}" onclick="submitAnswers()">
        Submit for Grading 🎯
      </button>
    </div>`;
  }
  return html;
}

function getResultTitle(r) {
  if (r >= 0.9) return '🌟 Outstanding!';
  if (r >= 0.75) return '🎉 Great Work!';
  if (r >= 0.6) return '👍 Good Effort!';
  return '💪 Keep Practising!';
}

// ═══════════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════════
async function submitAnswers() {
  const week = getWeekNumber();
  const cacheKey = `${currentKid}-w${week}-d${currentDay}`;
  const assignment = assignmentCache[cacheKey];
  if (!assignment) { alert('Assignment not loaded yet. Please wait.'); return; }

  const answers = assignment.questions.map((_, i) =>
    (document.getElementById(`answer-${i}`)?.value || '').trim()
  );

  const unanswered = answers.filter(a => !a).length;
  if (unanswered > 0 && !confirm(`${unanswered} question(s) unanswered. Submit anyway?`)) return;

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('grading-overlay').classList.add('visible');

  try {
    const result = await gradeAnswers(currentKid, assignment, answers);
    document.getElementById('grading-overlay').classList.remove('visible');

    setKidDayProgress(currentKid, currentDay, {
      score: result.score, total: result.total,
      answers, feedback: result.feedback, message: result.message,
      subject: DAYS[currentDay - 1].subject,
      week, date: new Date().toISOString()
    });

    syncToSheets(currentKid, currentDay, assignment, result, answers, week);
    updateStreak();
    renderDayTabs();
    renderDay(currentDay);
  } catch(err) {
    document.getElementById('grading-overlay').classList.remove('visible');
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('main-content').insertAdjacentHTML('afterbegin',
      `<div class="error-banner">⚠️ Grading failed: ${err.message}</div>`);
  }
}

// ═══════════════════════════════════════════════════════
function loadProgress() {
  try {
    const s = localStorage.getItem('hwProgress');
    progress = s ? JSON.parse(s) : {};
  } catch(e) { progress = {}; }
}

function saveProgress() {
  try { localStorage.setItem('hwProgress', JSON.stringify(progress)); } catch(e) {}
}

function getKidDayProgress(kid, day) {
  const week = getWeekNumber();
  return progress?.[kid]?.find(p => p.day === day && p.week === week) || null;
}

function setKidDayProgress(kid, day, data) {
  if (!progress[kid]) progress[kid] = [];
  progress[kid] = progress[kid].filter(p => !(p.day === day && p.week === data.week));
  progress[kid].push({ day, ...data });
  saveProgress();
}

function getStreak(kid) {
  const week = getWeekNumber();
  return DAYS.filter(d => getKidDayProgress(kid, d.day)).length;
}

      <h2>🎉 Week ${week} Complete!</h2>
      <p>Amazing work Fatima, Rayyan and Haniya. You're all stars this week!</p>
    </div>`;
  }

  let anyData = false;
  Object.entries(KIDS).forEach(([kidName, kidInfo]) => {
    const kidWeekProgress = (progress[kidName] || []).filter(p => p.week === week);
    if (kidWeekProgress.length === 0 && !allDone) return;
    anyData = true;

    const subScores = {};
    let totalScore = 0, totalMax = 0;
    kidWeekProgress.forEach(p => {
      const subj = DAYS[p.day - 1]?.subject || '';
      subScores[subj] = Math.round((p.score / p.total) * 100);
      totalScore += p.score; totalMax += p.total;
    });
    const overallPct = totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : 0;

    html += `<div class="kid-progress-card">
      <div class="kid-progress-header">
        <div class="prog-avatar" style="background:${kidInfo.light}">${kidInfo.emoji}</div>
        <div>
          <div class="prog-name">${kidName}</div>
          <div class="prog-summary">${kidInfo.year} · ${kidWeekProgress.length}/7 days · Week ${week}</div>
        </div>
        <div class="prog-pct" style="color:${kidInfo.color}">${overallPct}%</div>
      </div>
      <div class="subject-bars">`;

    DAYS.forEach(d => {
      const pct = subScores[d.subject];
      html += `<div class="bar-row">
        <div class="bar-label">${d.icon} ${d.subject}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct ?? 0}%;background:${kidInfo.color}"></div></div>
        <div class="bar-pct" style="color:${pct !== undefined ? kidInfo.color : 'var(--muted)'}">
          ${pct !== undefined ? pct + '%' : '—'}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  if (!anyData) {
    html += `<div style="text-align:center;padding:48px;color:var(--muted)">
      <div style="font-size:3rem;margin-bottom:14px">📭</div>
      <div style="font-weight:700;font-size:1.05rem">No progress yet this week</div>
      <div style="font-size:0.88rem;margin-top:8px">Scores will appear here once the kids start their homework</div>
    </div>`;
  }

  content.innerHTML = html;
}

// NAV
// ═══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = '';
  });
  document.getElementById(id).classList.add('active');
}
function showLogin() { showScreen('login-screen'); }
function logout() { currentKid = null; showScreen('login-screen'); }

// ═══════════════════════════════════════════════════════
// GOOGLE SHEETS SYNC
// ═══════════════════════════════════════════════════════
function syncToSheets(kid, day, assignment, result, answers, week) {
  if (!PROXY_URL) return;
  const dayInfo = DAYS[day - 1];
  const date = new Date().toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
  const payload = {
    action: 'saveProgress',
    kid, week, date,
    dayNum: day,
    day: dayInfo.label,
    subject: dayInfo.subject,
    topic: assignment.topic,
    score: result.score,
    total: result.total,
    questions: assignment.questions.map((q, i) => ({
      q: q.q,
      answer: answers[i] || '',
      score: result.feedback[i]?.score ?? 0,
      feedback: result.feedback[i]?.text || ''
    }))
  };
  addPendingSync(payload);
  updateSyncIndicator();
  attemptSync(payload);
}

async function attemptSync(payload) {
  if (!PROXY_URL) return;
  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    console.log('[Sync] response:', data);
    if (!res.ok || data.error) throw new Error(data.error || res.status);
    removePendingSync(payload.kid, payload.week, payload.dayNum);
    updateSyncIndicator();
  } catch(e) {
    console.error('[Sync] failed:', e);
    updateSyncIndicator();
  }
}

async function drainSyncQueue() {
  if (!PROXY_URL) return;
  const queue = getPendingQueue();
  if (!queue.length) return;
  for (const payload of [...queue]) {
    await attemptSync(payload);
  }
}

function getPendingQueue() {
  try { return JSON.parse(localStorage.getItem('hwSyncQueue') || '[]'); } catch(e) { return []; }
}

function addPendingSync(payload) {
  try {
    const queue = getPendingQueue().filter(p => !(p.kid === payload.kid && p.week === payload.week && p.dayNum === payload.dayNum));
    queue.push(payload);
    localStorage.setItem('hwSyncQueue', JSON.stringify(queue));
  } catch(e) {}
}

function removePendingSync(kid, week, dayNum) {
  try {
    const queue = getPendingQueue().filter(p => !(p.kid === kid && p.week === week && p.dayNum === dayNum));
    localStorage.setItem('hwSyncQueue', JSON.stringify(queue));
  } catch(e) {}
}

function updateSyncIndicator() {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  if (!PROXY_URL) { el.style.display = 'none'; return; }
  const count = getPendingQueue().length;
  if (count === 0) {
    el.style.display = 'none';
  } else {
    el.style.display = '';
    el.className = 'sync-indicator pending';
    el.textContent = `⏳ ${count} unsynced`;
  }
}

function devReset() {
  if (!confirm('Reset ALL progress and cached assignments? This cannot be undone.')) return;
  Object.keys(localStorage).forEach(k => {
    if (k.startsWith('assign-') || ['hwProgress', 'hwStartDate', 'hwSyncQueue'].includes(k)) {
      localStorage.removeItem(k);
    }
  });
  progress = {};
  assignmentCache = {};
  _cachedKey = '';
  currentKid = null;
  showScreen('login-screen');
  alert('Reset complete. Fresh start!');
}

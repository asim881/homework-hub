<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Homework Hub — Parent Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }
    .header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.1rem; font-weight: 700; }
    .last-updated { font-size: 0.75rem; opacity: 0.55; }

    .container { max-width: 960px; margin: 24px auto; padding: 0 16px; }

    /* ── Kid summary cards ── */
    .kid-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    @media (max-width: 640px) { .kid-cards { grid-template-columns: 1fr; } }

    .kid-card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border-top: 4px solid var(--accent);
    }
    .kid-name { font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .week-pct { font-size: 2.8rem; font-weight: 800; line-height: 1; color: var(--accent); }
    .week-meta { font-size: 0.72rem; color: #999; margin: 4px 0 14px; }
    .day-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .chip {
      font-size: 0.65rem; font-weight: 700;
      padding: 3px 7px; border-radius: 6px;
      background: #eee; color: #aaa;
    }
    .chip.good { background: #d4edda; color: #1a6b30; }
    .chip.ok   { background: #fff3cd; color: #7a5c00; }
    .chip.poor { background: #fde8e8; color: #a02020; }

    /* ── History section ── */
    .section-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .tab {
      padding: 5px 16px; border-radius: 20px;
      border: 2px solid #ddd; background: white;
      cursor: pointer; font-size: 0.82rem; font-weight: 600; color: #666;
      transition: all 0.15s;
    }
    .tab.active { border-color: #1a1a2e; background: #1a1a2e; color: white; }

    .table-wrap {
      background: white; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    thead th {
      background: #1a1a2e; color: white;
      padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap;
    }
    tbody td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
    .week-header td {
      background: #2d2d4e; color: white;
      font-weight: 700; font-size: 0.78rem;
      padding: 5px 12px; letter-spacing: 0.5px;
    }

    .loading, .error, .empty {
      text-align: center; padding: 40px;
      color: #999; font-size: 0.9rem;
    }
    .error { color: #c0392b; }

    .refresh-btn {
      background: none; border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 4px 12px; border-radius: 8px;
      cursor: pointer; font-size: 0.75rem;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); }

    /* ── Topic hints ── */
    .hints-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 12px;
    }
    @media (max-width: 640px) { .hints-grid { grid-template-columns: 1fr; } }
    .hint-card {
      background: white; border-radius: 12px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-top: 3px solid var(--accent);
    }
    .hint-label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .hint-input {
      width: 100%; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 8px 10px; font-size: 0.82rem; font-family: inherit;
      resize: vertical; min-height: 70px; outline: none; color: #1a1a2e;
    }
    .hint-input:focus { border-color: var(--accent); }
    .save-btn {
      background: #1a1a2e; color: white; border: none;
      padding: 8px 20px; border-radius: 8px; cursor: pointer;
      font-size: 0.85rem; font-weight: 600;
    }
    .save-btn:hover { background: #2d2d4e; }

    /* ── Week trend badge ── */
    .week-trend { font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
    .trend-up   { color: #1a6b30; background: #d4edda; }
    .trend-down { color: #a02020; background: #fde8e8; }
    .trend-same { color: #7a5c00; background: #fff3cd; }

    /* ── Stats box (this week / MTD / YTD) ── */
    .stats-box { margin: 10px 0 14px; padding: 10px 12px; background: #f8f9fc; border-radius: 10px; }
    .stats-header {
      display: grid; grid-template-columns: 1fr 68px 46px;
      gap: 6px; margin-bottom: 4px;
      font-size: 0.57rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #bbb;
    }
    .stats-row {
      display: grid; grid-template-columns: 1fr 68px 46px;
      gap: 6px; align-items: center;
      padding: 5px 0; border-top: 1px solid #eceef3;
    }
    .row-label { font-size: 0.7rem; font-weight: 600; color: #555; }
    .row-days  { display: flex; flex-direction: column; gap: 2px; }
    .days-frac { font-size: 0.72rem; font-weight: 800; color: #1a1a2e; }
    .row-score { font-size: 0.8rem; font-weight: 800; text-align: right; }
    .stats-prog { background: #e0e3ea; border-radius: 4px; height: 4px; overflow: hidden; }
    .stats-prog-fill { height: 100%; border-radius: 4px; }

    /* ── Trend bars ── */
    .trend-section { margin-top: 12px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
    .trend-label { font-size: 0.62rem; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .trend-bars { display: flex; gap: 4px; align-items: flex-end; height: 48px; }
    .trend-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; min-width: 0; }
    .trend-bar-pct { font-size: 0.58rem; font-weight: 700; }
    .trend-bar { width: 100%; border-radius: 3px; min-height: 4px; }
    .trend-bar-week { font-size: 0.56rem; color: #bbb; }

    /* ── Detail row ── */
    tbody tr[data-expanded]:hover { filter: brightness(0.97); }
    .detail-row td { padding: 0 !important; border-bottom: none !important; }
    .detail-inner { padding: 10px 16px 14px; background: #f4f6fa; border-bottom: 2px solid #e0e0e0; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .detail-table th { background: #2d2d4e; color: white; padding: 6px 10px; text-align: left; font-weight: 600; }
    .detail-table td { padding: 6px 10px; border-bottom: 1px solid #e8e8e8; vertical-align: top; }
    .detail-table tr:last-child td { border-bottom: none; }

    /* ── PIN overlay ── */
    .pin-overlay {
      position: fixed; inset: 0;
      background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .pin-box {
      background: white; border-radius: 20px;
      padding: 40px 36px; text-align: center; width: 300px;
    }
    .pin-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .pin-subtitle { font-size: 0.85rem; color: #999; margin-bottom: 24px; }
    .pin-input {
      width: 100%; font-size: 2rem; letter-spacing: 0.5em;
      text-align: center; border: 2px solid #ddd; border-radius: 10px;
      padding: 10px; outline: none; margin-bottom: 12px;
    }
    .pin-input:focus { border-color: #1a1a2e; }
    .pin-error { color: #c0392b; font-size: 0.82rem; min-height: 1.2em; }
  </style>
</head>
<body>

<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-title">Parent Dashboard</div>
    <div class="pin-subtitle">Enter your PIN to continue</div>
    <input type="password" inputmode="numeric" maxlength="4" class="pin-input" id="pinInput" placeholder="••••" autofocus>
    <div class="pin-error" id="pinError"></div>
  </div>
</div>

<div class="header">
  <h1>Homework Hub — Parent Dashboard</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="last-updated" id="lastUpdated">Loading…</span>
    <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
  </div>
</div>

<div class="container">
  <div class="kid-cards" id="kidCards">
    <div class="loading" style="grid-column:1/-1">Loading…</div>
  </div>

  <div class="section-title" style="margin-bottom:10px">Topic Hints</div>
  <p style="font-size:0.82rem;color:#888;margin-bottom:14px">Steer next week's AI-generated assignments per kid. Leave blank to let the AI decide.</p>
  <div class="hints-grid">
    <div class="hint-card" style="--accent:#ff6b9d">
      <label class="hint-label" for="hint-Fatima">Fatima</label>
      <textarea class="hint-input" id="hint-Fatima" placeholder="e.g. Focus on fractions this week"></textarea>
    </div>
    <div class="hint-card" style="--accent:#4e9af1">
      <label class="hint-label" for="hint-Rayyan">Rayyan</label>
      <textarea class="hint-input" id="hint-Rayyan" placeholder="e.g. More Python loops and functions"></textarea>
    </div>
    <div class="hint-card" style="--accent:#7bc67e">
      <label class="hint-label" for="hint-Haniya">Haniya</label>
      <textarea class="hint-input" id="hint-Haniya" placeholder="e.g. Extra reading comprehension practice"></textarea>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:32px">
    <button class="save-btn" onclick="saveHints()">Save Hints</button>
    <span id="hintStatus" style="font-size:0.82rem"></span>
  </div>

  <div class="section-title">Activity History</div>
  <div class="filter-tabs">
    <button class="tab active" data-kid="All"    onclick="setFilter(this)">All</button>
    <button class="tab"        data-kid="Fatima" onclick="setFilter(this)">Fatima</button>
    <button class="tab"        data-kid="Rayyan" onclick="setFilter(this)">Rayyan</button>
    <button class="tab"        data-kid="Haniya" onclick="setFilter(this)">Haniya</button>
  </div>
  <div class="table-wrap" id="historyTable">
    <div class="loading">Loading…</div>
  </div>
</div>

<script>
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbxB-SklnHp7Q5XwnOSD_mbGSYDAY9s9ccFlQdPIpSZ6qhrWYpP6z-Thd5GEPTjI8JHyRg/exec';

const KID_COLORS = {
  Fatima: { bg: '#ffe0ed', accent: '#ff6b9d' },
  Rayyan: { bg: '#daeeff', accent: '#4e9af1' },
  Haniya: { bg: '#dff2e0', accent: '#7bc67e' }
};
const KIDS      = ['Fatima', 'Rayyan', 'Haniya'];
const DAY_ORDER = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

let allRows    = [];
let activeKid  = 'All';

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadData() {
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'getData' })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return (data.rows || []).filter(r => !String(r.Kid || '').startsWith('📊'));
}

// ── Helpers ────────────────────────────────────────────────────────────────────

const PROGRAM_START = new Date('2026-05-04');

// Sheets stores "90%" as 0.9 when read back via getValues — normalise to 0-100.
function normPct(val) {
  const n = parseFloat(val) || 0;
  return n <= 1 ? Math.round(n * 100) : Math.round(n);
}

function weekPct(rows) {
  let s = 0, m = 0;
  rows.forEach(r => { s += Number(r.Score) || 0; m += Number(r['Out Of']) || 0; });
  return m > 0 ? Math.round((s / m) * 100) : null;
}

function rowsInPeriod(kidRows, period) {
  const now = new Date();
  return kidRows.filter(r => {
    const d = new Date(r.Date);
    if (isNaN(d.getTime())) return false;
    if (period === 'month') return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    if (period === 'year')  return d.getFullYear() === now.getFullYear();
    return true;
  });
}

function maxDaysInPeriod(period) {
  if (period === 'week') return 7;
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const periodStart = period === 'month'
    ? new Date(now.getFullYear(), now.getMonth(), 1)
    : new Date(now.getFullYear(), 0, 1);
  const from = periodStart < PROGRAM_START ? new Date(PROGRAM_START) : periodStart;
  return Math.floor((today - from) / 86400000) + 1;
}

function statRow(label, rows, maxDays, accent) {
  const pct        = weekPct(rows);
  const done       = rows.length;
  const fillPct    = Math.min(100, Math.round((done / maxDays) * 100));
  const scoreColor = pct === null ? '#aaa' : pct >= 75 ? '#1a6b30' : pct >= 50 ? '#7a5c00' : '#a02020';
  return `<div class="stats-row">
    <div class="row-label">${label}</div>
    <div class="row-days">
      <div class="days-frac">${done} / ${maxDays}</div>
      <div class="stats-prog"><div class="stats-prog-fill" style="width:${fillPct}%;background:${accent}"></div></div>
    </div>
    <div class="row-score" style="color:${scoreColor}">${pct !== null ? pct + '%' : '—'}</div>
  </div>`;
}

// ── Render kid summary cards ───────────────────────────────────────────────────

function renderCards(rows) {
  const maxWeek   = Math.max(0, ...rows.map(r => Number(r.Week)).filter(n => !isNaN(n)));
  const monthName = new Date().toLocaleString('default', { month: 'long' });
  const yearNum   = new Date().getFullYear();

  document.getElementById('kidCards').innerHTML = KIDS.map(kid => {
    const c       = KID_COLORS[kid];
    const kidRows = rows.filter(r => r.Kid === kid);

    // Current week
    const weekRows = kidRows.filter(r => Number(r.Week) === maxWeek);
    const pct      = weekPct(weekRows);

    // Previous week trend badge
    const prevRows = kidRows.filter(r => Number(r.Week) === maxWeek - 1);
    const prevPct  = weekPct(prevRows);
    let trendBadge = '';
    if (pct !== null && prevPct !== null) {
      const diff  = pct - prevPct;
      const arrow = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
      const cls   = diff > 0 ? 'trend-up' : diff < 0 ? 'trend-down' : 'trend-same';
      const label = diff !== 0 ? `${arrow} ${Math.abs(diff)}% vs W${maxWeek - 1}` : `→ same as W${maxWeek - 1}`;
      trendBadge  = `<span class="week-trend ${cls}">${label}</span>`;
    } else if (pct !== null && maxWeek === 1) {
      trendBadge = `<span class="week-trend trend-same">first week</span>`;
    }

    // Day chips for current week
    const byDay = {};
    weekRows.forEach(r => { byDay[r.Day] = normPct(r['%']); });
    const chips = DAY_ORDER.map(day => {
      if (!(day in byDay)) return `<span class="chip">${day}</span>`;
      const p   = byDay[day];
      const cls = p >= 75 ? 'good' : p >= 50 ? 'ok' : 'poor';
      return `<span class="chip ${cls}">${day}</span>`;
    }).join('');

    // MTD / YTD rows
    const mtdRows = rowsInPeriod(kidRows, 'month');
    const ytdRows = rowsInPeriod(kidRows, 'year');
    const mtdMax  = maxDaysInPeriod('month');
    const ytdMax  = maxDaysInPeriod('year');

    // Multi-week trend bars
    const allWeeks = [...new Set(kidRows.map(r => Number(r.Week)).filter(n => !isNaN(n)))].sort((a, b) => a - b);
    let barHtml = '';
    if (allWeeks.length > 1) {
      const bars = allWeeks.map(w => {
        const p      = weekPct(kidRows.filter(r => Number(r.Week) === w)) ?? 0;
        const bg     = p >= 75 ? '#d4edda' : p >= 50 ? '#fff3cd' : '#fde8e8';
        const fg     = p >= 75 ? '#1a6b30' : p >= 50 ? '#7a5c00' : '#a02020';
        const height = Math.max(4, Math.round(p * 0.36)) + 'px';
        return `<div class="trend-bar-wrap">
          <div class="trend-bar-pct" style="color:${fg}">${p}%</div>
          <div class="trend-bar" style="height:${height};background:${bg};border:1px solid ${fg}33"></div>
          <div class="trend-bar-week">W${w}</div>
        </div>`;
      }).join('');
      barHtml = `<div class="trend-section"><div class="trend-label">Weekly trend</div><div class="trend-bars">${bars}</div></div>`;
    }

    return `
      <div class="kid-card" style="--accent:${c.accent}">
        <div class="kid-name">${kid}</div>
        <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:2px">
          <div class="week-pct">${pct !== null ? pct + '%' : '—'}</div>
          ${trendBadge}
        </div>
        <div class="week-meta">Week ${maxWeek || '—'}</div>
        <div class="stats-box">
          <div class="stats-header"><span></span><span>Days done</span><span style="text-align:right">Score</span></div>
          ${statRow('This week', weekRows, 7, c.accent)}
          ${statRow(monthName + ' (MTD)', mtdRows, mtdMax, c.accent)}
          ${statRow(yearNum + ' (YTD)', ytdRows, ytdMax, c.accent)}
        </div>
        <div class="day-chips">${chips}</div>
        ${barHtml}
      </div>`;
  }).join('');
}

// ── Render history table ───────────────────────────────────────────────────────

function renderHistory(rows) {
  const filtered = activeKid === 'All' ? rows : rows.filter(r => r.Kid === activeKid);
  const el = document.getElementById('historyTable');

  if (!filtered.length) {
    el.innerHTML = '<div class="empty">No data yet — submit some homework first.</div>';
    return;
  }

  const weeks = [...new Set(filtered.map(r => Number(r.Week)).filter(n => !isNaN(n)))].sort((a, b) => b - a);

  let html = `<table>
    <thead><tr>
      <th>Kid</th><th>Date</th><th>Day</th><th>Subject</th>
      <th>Topic</th><th>Score</th><th>%</th><th>Status</th>
    </tr></thead><tbody>`;

  weeks.forEach(week => {
    const wRows = filtered.filter(r => Number(r.Week) === week);
    html += `<tr class="week-header"><td colspan="8">Week ${week}</td></tr>`;
    wRows.forEach(r => {
      const c  = KID_COLORS[r.Kid] || { bg: '#f5f5f5', accent: '#888' };
      const id = `detail-${r.Kid}-${Number(r.Week)}-${r.Day}`;
      html += `<tr style="background:${c.bg};cursor:pointer" data-expanded="false"
          onclick="toggleDetail(this,'${r.Kid}',${Number(r.Week)},'${r.Day}')">
        <td><strong style="color:${c.accent}">${r.Kid}</strong></td>
        <td style="white-space:nowrap">${r.Date || '—'}</td>
        <td>${r.Day || '—'}</td>
        <td>${r.Subject || '—'}</td>
        <td style="color:#555;font-size:0.78rem">${r.Topic || '—'}</td>
        <td>${r.Score || 0}/${r['Out Of'] || 0}</td>
        <td><strong>${r['%'] || '—'}</strong></td>
        <td>${r.Status || '—'} <span style="opacity:.4;font-size:.7rem">▾</span></td>
      </tr>
      <tr id="${id}" class="detail-row" style="display:none">
        <td colspan="8"><div class="detail-inner">Loading…</div></td>
      </tr>`;
    });
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── Filter tabs ────────────────────────────────────────────────────────────────

function setFilter(btn) {
  activeKid = btn.dataset.kid;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderHistory(allRows);
}

// ── Main refresh ───────────────────────────────────────────────────────────────

async function refresh() {
  document.getElementById('lastUpdated').textContent = 'Refreshing…';
  try {
    allRows = await loadData();
    renderCards(allRows);
    renderHistory(allRows);
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    document.getElementById('kidCards').innerHTML =
      `<div class="error" style="grid-column:1/-1">Failed to load: ${e.message}</div>`;
    document.getElementById('lastUpdated').textContent = 'Error';
  }
}

// ── Topic hints ───────────────────────────────────────────────────────────────

async function loadHints() {
  for (const kid of KIDS) {
    try {
      const res  = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'getSettings', kid })
      });
      const data = await res.json();
      const el   = document.getElementById(`hint-${kid}`);
      if (el && data.hint) el.value = data.hint;
    } catch(e) { /* silently ignore — hints are non-critical */ }
  }
}

async function saveHints() {
  const status   = document.getElementById('hintStatus');
  status.textContent = 'Saving…';
  status.style.color = '#888';

  const settings = {};
  KIDS.forEach(kid => {
    settings[kid] = (document.getElementById(`hint-${kid}`)?.value || '').trim();
  });

  try {
    const res  = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'saveSettings', settings })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    status.textContent = 'Saved!';
    status.style.color = '#1a6b30';
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch(e) {
    status.textContent = 'Failed: ' + e.message;
    status.style.color = '#c0392b';
  }
}

// ── Drill-down ────────────────────────────────────────────────────────────────

async function toggleDetail(row, kid, week, day) {
  const detailRow = document.getElementById(`detail-${kid}-${week}-${day}`);
  const isOpen    = row.dataset.expanded === 'true';

  if (isOpen) {
    detailRow.style.display = 'none';
    row.dataset.expanded = 'false';
    row.querySelector('span').textContent = '▾';
    return;
  }

  row.dataset.expanded = 'true';
  row.querySelector('span').textContent = '▴';
  detailRow.style.display = '';

  if (detailRow.dataset.loaded) return;

  const inner = detailRow.querySelector('.detail-inner');
  try {
    const res  = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getKidData', kid, week, day })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const qRows = data.rows || [];
    const c     = KID_COLORS[kid] || { accent: '#888' };

    if (!qRows.length) {
      inner.innerHTML = '<em style="color:#aaa;font-size:0.8rem">No question detail available.</em>';
    } else {
      inner.innerHTML = `
        <table class="detail-table">
          <thead><tr><th>#</th><th>Question</th><th>Answer</th><th>Score</th><th>Feedback</th></tr></thead>
          <tbody>
            ${qRows.map(q => `<tr>
              <td style="white-space:nowrap;color:#aaa">${q['Q#']}</td>
              <td>${q['Question'] || '—'}</td>
              <td>${q['Their Answer'] || '—'}</td>
              <td style="text-align:center;font-weight:700;color:${c.accent}">${q['Score']}</td>
              <td style="color:#555">${q['Feedback'] || '—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }
    detailRow.dataset.loaded = '1';
  } catch(e) {
    inner.innerHTML = `<span class="error">Failed to load: ${e.message}</span>`;
  }
}

const DASHBOARD_PIN = '3090';

function startDashboard() {
  refresh();
  loadHints();
  setInterval(refresh, 2 * 60 * 1000);
}

if (sessionStorage.getItem('dashAuth') === '1') {
  document.getElementById('pinOverlay').style.display = 'none';
  startDashboard();
} else {
  document.getElementById('pinInput').addEventListener('input', function() {
    const val = this.value;
    if (val.length < 4) return;
    if (val === DASHBOARD_PIN) {
      sessionStorage.setItem('dashAuth', '1');
      document.getElementById('pinOverlay').style.display = 'none';
      startDashboard();
    } else {
      document.getElementById('pinError').textContent = 'Incorrect PIN, try again.';
      this.value = '';
    }
  });
}
</script>
